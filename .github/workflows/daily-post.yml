name: Publication quotidienne ProRDV

on:
  schedule:
    # 08:00 UTC = 09:00 heure du Cameroun (WAT, UTC+1)
    - cron: "0 8 * * *"
  workflow_dispatch: {}

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Installation des dépendances
        run: npm ci

      - name: Compilation TypeScript
        run: npm run build

      - name: Publication du jour
        run: npm run post
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          GRAPH_API_VERSION: ${{ secrets.GRAPH_API_VERSION }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE_NAME: ${{ secrets.AIRTABLE_TABLE_NAME }}
          CONTENT_MODE: ${{ secrets.CONTENT_MODE }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          IMAGE_PROVIDER: ${{ secrets.IMAGE_PROVIDER }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          IDEOGRAM_API_KEY: ${{ secrets.IDEOGRAM_API_KEY }}
          N8N_ALERT_WEBHOOK_URL: ${{ secrets.N8N_ALERT_WEBHOOK_URL }}
